name: Build Registry

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: oven-sh/setup-bun@v1
      - run: bun install
      - run: bun run build
      
      - name: Upload build artifacts to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd dist
          zip -r registry.zip .
          gh release upload ${{ github.event.release.tag_name }} registry.zip
